<script>
(function () {
  var KEY = 'rl_docs_auth';
  var PASSWORD = 'redloft2026';

  if (sessionStorage.getItem(KEY) === 'ok') return;

  var overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed', 'inset:0', 'z-index:99999',
    'background:#f5f6fa',
    'display:flex', 'flex-direction:column',
    'align-items:center', 'justify-content:center',
    'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif'
  ].join(';');

  overlay.innerHTML = [
    '<div style="text-align:center;max-width:320px;padding:40px">',
    '  <p style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;',
    '     color:#888;margin:0 0 8px">REDLOFT.RU</p>',
    '  <h2 style="font-size:18px;font-weight:500;color:#222;margin:0 0 28px">',
    '     Проект Солнце Москвы</h2>',
    '  <input id="rl-pwd" type="password" placeholder="Пароль"',
    '    style="width:100%;box-sizing:border-box;padding:10px 14px;',
    '           border:1px solid #ddd;border-radius:6px;font-size:14px;',
    '           outline:none;margin-bottom:12px"/>',
    '  <button id="rl-btn"',
    '    style="width:100%;padding:10px;background:#333;color:#fff;',
    '           border:none;border-radius:6px;font-size:14px;cursor:pointer">',
    '    Войти</button>',
    '  <p id="rl-err" style="color:#c00;font-size:13px;margin:10px 0 0;',
    '     visibility:hidden">Неверный пароль</p>',
    '</div>'
  ].join('');

  document.documentElement.appendChild(overlay);

  function check() {
    var val = document.getElementById('rl-pwd').value;
    if (val === PASSWORD) {
      sessionStorage.setItem(KEY, 'ok');
      overlay.remove();
    } else {
      document.getElementById('rl-err').style.visibility = 'visible';
      document.getElementById('rl-pwd').value = '';
      document.getElementById('rl-pwd').focus();
    }
  }

  document.getElementById('rl-btn').addEventListener('click', check);
  document.getElementById('rl-pwd').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') check();
  });

  window.addEventListener('DOMContentLoaded', function () {
    document.getElementById('rl-pwd').focus();
  });
})();
</script>
